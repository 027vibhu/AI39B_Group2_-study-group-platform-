<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room - LOREVIA</title>
</head>
<body>
    <h1>Create a New Study Room</h1>
    <p>Click the button below to generate a unique 6-digit room code and start studying.</p>
    <button id="createRoomBtn">Create 6-Digit Room</button>

    <script>
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            window.location.href = `/chat/${roomCode}`;
        });
    </script>
</body>
</html>
