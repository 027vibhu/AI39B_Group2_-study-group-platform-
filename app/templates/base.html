<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LOREVIA{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nav_bar.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="logo-section">
      <div class="logo">
        <a href="/"><img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="LOREVIA logo"></a>
      </div>
      <h1>LOREVIA</h1>
    </div>

    <ul class="nav-links">
      <li><a class="{{ 'active' if request.endpoint == 'home.index' }}" href="{{ url_for('home.index') }}">Home</a></li>
      <li><a class="{{ 'active' if request.endpoint == 'home.features' }}" href="{{ url_for('home.features') }}">Features</a></li>
      <li><a class="{{ 'active' if request.endpoint == 'home.about' }}" href="{{ url_for('home.about') }}">About</a></li>
    </ul>

    <a class="nav-btn" href="{{ url_for('auth.login') }}">Login</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
