{% extends "base_sidebar.html" %}

{% block nav %}
  <a href="{{ url_for('home.dashboard') }}" class="nav-item {% if request.endpoint == 'home.dashboard' %}active{% endif %}" title="Dashboard">
    <i class="fa-solid fa-house"></i>
    <span class="nav-label">Dashboard</span>
  </a>
  <a href="{{ url_for('home.create_room') }}" class="nav-item {% if request.endpoint == 'home.create_room' %}active{% endif %}" title="Create Room">
    <i class="fa-solid fa-plus"></i>
    <span class="nav-label">Create Room</span>
  </a>
  <a href="{{ url_for('home.join_room') }}" class="nav-item {% if request.endpoint == 'home.join_room' %}active{% endif %}" title="Join Room">
    <i class="fa-solid fa-comments"></i>
    <span class="nav-label">Join Room</span>
  </a>
  <a href="{{ url_for('home.browse_rooms') }}" class="nav-item {% if request.endpoint == 'home.browse_rooms' %}active{% endif %}" title="Browse Rooms">
    <i class="fa-solid fa-compass"></i>
    <span class="nav-label">Browse Rooms</span>
  </a>
  <a href="{{ url_for('home.notes') }}" class="nav-item {% if request.endpoint == 'home.notes' %}active{% endif %}" title="Notes">
    <i class="fa-solid fa-file-pdf"></i>
    <span class="nav-label">Notes</span>
  </a>
  <a href="{{ url_for('home.schedule_page') }}" class="nav-item {% if request.endpoint == 'home.schedule_page' %}active{% endif %}" title="Schedule">
    <i class="fa-solid fa-calendar-check"></i>
    <span class="nav-label">Schedule</span>
  </a>
  {% if session.get('role') == 'admin' %}
    <a href="{{ url_for('admin.dashboard') }}" class="nav-item {% if request.endpoint and request.endpoint.startswith('admin.') %}active{% endif %}" title="Admin Panel">
      <i class="fa-solid fa-shield-halved"></i>
      <span class="nav-label">Admin</span>
    </a>
  {% endif %}
  <a href="{{ url_for('home.whiteboard') }}" class="nav-item {% if request.endpoint and request.endpoint.startswith('home.whiteboard') %}active{% endif %}" title="Whiteboard">
    <i class="fa-solid fa-chalkboard"></i>
    <span class="nav-label">Whiteboard</span>
  </a>
  <a href="{{ url_for('home.profile') }}" class="nav-item {% if request.endpoint == 'home.profile' %}active{% endif %}" title="Profile">
    <i class="fa-solid fa-user"></i>
    <span class="nav-label">Profile</span>
  </a>
  <a href="{{ url_for('auth.logout') }}" class="nav-item nav-item-signout" title="Sign out">
    <i class="fa-solid fa-right-from-bracket"></i>
    <span class="nav-label">Sign out</span>
  </a>
{% endblock %}

{% block rooms %}
  {{ super() }}
{% endblock %}
