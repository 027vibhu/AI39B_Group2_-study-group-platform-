<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOREVIA Auth</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo-section">
      <div class="logo">
        <img src="logo.jpg" alt="LOREVIA logo">
      </div>
      <h1>LOREVIA</h1>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">About</a></li>
    </ul>

    <button class="nav-btn">Get Started</button>

  </nav>

  <!-- AUTH CONTAINER -->

  <div class="container">

    <div class="forms-container">

      <div class="signin-signup">

        <!-- LOGIN -->

        <form class="sign-in-form">

          <h2 class="title">Sign in</h2>

          <div class="input-field">
            <span>📧</span>
            <input type="text" placeholder="Email or Username" required>
          </div>

          <div class="input-field">
            <span>🔒</span>
            <input type="password" placeholder="Password" required>
          </div>

          <button class="btn">Login</button>

        </form>

        <!-- SIGNUP -->

        <form class="sign-up-form">

          <h2 class="title">Sign up</h2>

          <div class="input-field">
            <span>👤</span>
            <input type="text" placeholder="Username" required>
          </div>

          <div class="input-field">
            <span>📧</span>
            <input type="email" placeholder="Email" required>
          </div>

          <div class="input-field">
            <span>🔒</span>
            <input type="password" placeholder="Password" required>
          </div>

          <button class="btn">Sign Up</button>

        </form>

      </div>

    </div>

    <!-- PANELS -->

    <div class="panels-container">

      <div class="panel left-panel">

        <div class="content">

          <h3>New here?</h3>

          <p>
            Join Lorevia and collaborate with students through study rooms and realtime discussions.
          </p>

          <button class="btn transparent" id="sign-up-btn">
            SIGN UP
          </button>

        </div>

      </div>

      <div class="panel right-panel">

        <div class="content">

          <h3>Welcome Back</h3>

          <p>
            Continue learning with your friends and access your study rooms instantly.
          </p>

          <button class="btn transparent" id="sign-in-btn">
            SIGN IN
          </button>

        </div>

      </div>

    </div>

  </div>

  <script>

    const signUpBtn = document.getElementById("sign-up-btn");
    const signInBtn = document.getElementById("sign-in-btn");
    const container = document.querySelector(".container");

    signUpBtn.addEventListener("click", () => {
      container.classList.add("sign-up-mode");
    });

    signInBtn.addEventListener("click", () => {
      container.classList.remove("sign-up-mode");
    });

    document.querySelectorAll('.input-field').forEach(field => {

      field.addEventListener('click', (e) => {

        if (e.target.tagName.toLowerCase() === 'input') return;

        const input = field.querySelector('input');

        if (input) input.focus();

      });

    });

  </script>

</body>
</html>
