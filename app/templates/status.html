<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorevia Study Group Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/status.css') }}">
    <script src="{{ url_for('static', filename='js/status.js') }}"></script>
</head>
<body>

    <!-- Main Wrapper -->
    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <h1>Lorevia</h1>
                <p>Study Group Platform</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#">Dashboard</a></li>
                    <li><a href="#">Study Groups</a></li>
                    <li><a href="#">Members</a></li>
                    <li><a href="#">Messages</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Navigation -->
            <header class="topbar">
                <div class="search-area">
                    <input type="text" placeholder="Search study groups...">
                </div>

                <div class="profile-area">
                    <span class="notification">🔔</span>
                    <div class="user-profile">
                        <span class="username">Student User</span>
                    </div>
                </div>
            </header>

            <!-- Online Status Section -->
            <section class="status-section">
                <h2>Active Members</h2>

                <div class="members-container">

                    {% for member in members %}

                    <div class="member-card {{ 'online' if member.is_online else 'offline' }}">
                        <div class="member-card {{ 'online' if member.is_online else 'offline' }}"
data-member="{{ member.name }}">
                        <span class="presence-indicator"></span>
                            <div class="member-header">
                            <span class="status-dot"></span>
                            <h3>{{ member.name }}</h3>
                        </div>

                        <p>Status: {{ 'Online' if member.is_online else 'Offline' }}</p>
                    </div>

                    {% endfor %}

                </div>
            </section>

        </main>

    </div>


</body>
</html>
