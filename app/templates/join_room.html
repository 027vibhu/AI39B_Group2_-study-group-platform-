<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lorevia - Join Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/join_room.css') }}">
</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      <div class="logo-box">L</div>
      <h2>LOREVIA</h2>
    </div>

    <div class="menu">

      <a href="#">
        <div class="icon">⌂</div>
        Dashboard
      </a>

      <a href="#">
        <div class="icon">＋</div>
        Create Room
      </a>

      <a href="#" class="active">
        <div class="icon">↗</div>
        Join Room
      </a>

      <a href="#">
        <div class="icon">◉</div>
        Browse Rooms
      </a>

      <div class="divider"></div>

      <a href="#">
        <div class="icon">1</div>
        test1
      </a>

      <a href="#">
        <div class="icon">2</div>
        test2
      </a>

      <a href="#">
        <div class="icon">3</div>
        test3
      </a>

    </div>

  </aside>

  <!-- MAIN -->

  <section class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <h1>Join Workspace</h1>

      <div class="profile">
        U
        <div class="status"></div>
      </div>

    </div>

    <!-- MAIN CARD -->

    <div class="card">

      <!-- LEFT SIDE -->

      <div class="left">

        <div class="left-content">

          <h1>Join a Room</h1>

          <p>
            Enter your 6 digit room code and instantly
            connect with your study team.
          </p>

        </div>

      </div>

      <!-- RIGHT SIDE -->

      <div class="right">

        <div class="join-box">

          <h2>Join</h2>

          <p>Type your 6 digit room code below</p>

          <div class="code-inputs">

            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">

          </div>

          <button class="join-btn">
            Join Room
          </button>

        </div>

      </div>

    </div>

  </section>

  <script>

    const inputs = document.querySelectorAll('.code-inputs input');

    inputs.forEach((input, index) => {

      input.addEventListener('input', () => {

        if(input.value.length === 1 && index < inputs.length - 1){
          inputs[index + 1].focus();
        }

      });

      input.addEventListener('keydown', (e) => {

        if(e.key === 'Backspace' && input.value === '' && index > 0){
          inputs[index - 1].focus();
        }

      });

    });

  </script>

</body>
</html>
