<!DOCTYPE html>
<html>
<head>
    <title>Study Group Chat</title>
    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f6f9;
            font-family:Arial,sans-serif;
        }

        .chat-container{
            width:70%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#333;
        }

        .chat-box{
            height:500px;
            overflow-y:auto;
            border:1px solid #ddd;
            padding:15px;
            background:#fafafa;
            margin-bottom:15px;
        }

        .notification{
            text-align:center;
            background:#fff3cd;
            color:#856404;
            padding:8px;
            margin:10px 0;
            border-radius:20px;
            font-style:italic;
            font-size:14px;
        }

        .message{
            background:#e8f0fe;
            padding:10px;
            margin-bottom:10px;
            border-radius:8px;
        }

        .username{
            font-weight:bold;
            color:#1a73e8;
            margin-bottom:5px;
        }

        .text{
            color:#333;
        }

        .message-form{
            display:flex;
            gap:10px;
        }

        .message-form input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .message-form button{
            padding:12px 20px;
            border:none;
            background:#1a73e8;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .message-form button:hover{
            background:#1557b0;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <h2>Study Group Activity</h2>

    <section class="notifications-area">
        <h3>Notifications</h3>
        <div class="notification notification-event">username joined the room</div>
        <div class="notification notification-event">username left the room</div>
        {% for notification in notifications %}
        <div class="notification">
            {{ notification }}
        </div>
        {% endfor %}
    </section>

    <div class="chat-box">

        {% for msg in messages %}
        <div class="message">
            <div class="username">{{ msg.username }}</div>
            <div class="text">{{ msg.message }}</div>
        </div>
        {% endfor %}

    </div>

    <form action="/send_message" method="POST" class="message-form">
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
