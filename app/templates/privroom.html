<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Private Room Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f5f3ef;
  height:100vh;
  display:flex;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:white;
  padding:30px 20px;
  border-right:1px solid #eee;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:50px;
}

.logo-box{
  width:55px;
  height:55px;
  border-radius:16px;
  background:#666BB3;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:700;
}

.logo h1{
  font-size:34px;
  color:#2c2c2c;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu button{
  border:none;
  background:transparent;
  padding:16px;
  border-radius:16px;
  text-align:left;
  cursor:pointer;
  font-size:16px;
  color:#555;
  transition:0.3s;
}

.menu button:hover,
.active{
  background:#EEF0FF !important;
  color:#666BB3 !important;
  font-weight:600;
}

.room-title{
  margin-top:40px;
  margin-bottom:20px;
  color:#777;
  font-size:14px;
}

.room{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:16px;
  cursor:pointer;
  margin-bottom:10px;
}

.room:hover{
  background:#EEF0FF;
}

.room.active-room{
  background:#EEF0FF;
}

.room-name{
  font-weight:500;
  color:#444;
}

/* MAIN */

.main{
  flex:1;
  padding:25px;
  display:flex;
  gap:20px;
}

/* CHAT SECTION */

.chat-section{
  flex:1;
  background:white;
  border-radius:30px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */

.chat-header{
  padding:25px 30px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-left h2{
  font-size:30px;
  color:#222;
}

.online{
  margin-top:6px;
  color:#55C878;
  font-size:14px;
}

.header-actions{
  display:flex;
  gap:15px;
}

.action-btn{
  border:none;
  background:#F5F6FB;
  width:52px;
  height:52px;
  border-radius:16px;
  cursor:pointer;
  font-size:20px;
}

/* CHAT BODY */

.chat-body{
  flex:1;
  padding:30px;
  overflow-y:auto;
  background:#FCFCFC;
}

.message{
  display:flex;
  margin-bottom:25px;
}

.sent{
  justify-content:flex-end;
}

.message-content{
  max-width:320px;
  padding:16px 20px;
  border-radius:22px;
  font-size:15px;
  line-height:1.6;
}

.received .message-content{
  background:#EEF0FF;
  color:#333;
}

.sent .message-content{
  background:#666BB3;
  color:white;
}

.message img{
  width:220px;
  border-radius:18px;
}

/* INPUT */

.chat-input{
  padding:20px;
  border-top:1px solid #eee;
  display:flex;
  align-items:center;
  gap:15px;
  background:white;
}

.icon-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:16px;
  background:#F5F6FB;
  cursor:pointer;
  font-size:20px;
}

.input-box{
  flex:1;
  padding:16px 20px;
  border:none;
  border-radius:18px;
  background:#F5F6FB;
  outline:none;
  font-size:15px;
}

.send-btn{
  width:55px;
  height:55px;
  border:none;
  border-radius:18px;
  background:#666BB3;
  color:white;
  font-size:22px;
  cursor:pointer;
}

/* RIGHT PANEL */

.right-panel{
  width:300px;
  background:white;
  border-radius:30px;
  padding:25px;
}

.right-panel h3{
  margin-bottom:25px;
  font-size:22px;
  color:#222;
}

.member{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:22px;
}

.member-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.member-avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#666BB3;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

.member-name{
  font-size:15px;
  color:#333;
}

.green-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#4FD675;
}

.section-title{
  margin-top:35px;
  margin-bottom:20px;
  color:#777;
  font-size:15px;
}

.setting{
  padding:14px 0;
  cursor:pointer;
  color:#444;
}

.setting:hover{
  color:#666BB3;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">
    <div class="logo-box">L</div>
    <h1>LOREVIA</h1>
  </div>

  <div class="menu">
    <button>Dashboard</button>
    <button>Create Room</button>
    <button class="active">Join Room</button>
    <button>Browse Rooms</button>
  </div>

  <div class="room-title">PRIVATE ROOMS</div>

  <div class="room active-room">
    <div class="room-name">chat1</div>
    💬
  </div>

  <div class="room">
    <div class="room-name">test2</div>
  </div>

  <div class="room">
    <div class="room-name">test3</div>
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <!-- CHAT -->

  <div class="chat-section">

    <!-- HEADER -->

    <div class="chat-header">

      <div class="header-left">
        <h2>Private Room: chat1 🔒</h2>
        <div class="online">● 3 members online</div>
      </div>

      <div class="header-actions">
        <button class="action-btn">📞</button>
        <button class="action-btn">🎥</button>
        <button class="action-btn">➕</button>
      </div>

    </div>

    <!-- BODY -->

    <div class="chat-body" id="chatBody">

      <div class="message received">
        <div class="message-content">
          Hey everyone 👋
        </div>
      </div>

      <div class="message sent">
        <div class="message-content">
          Let's finish the UI today.
        </div>
      </div>

      <div class="message received">
        <div class="message-content">
          <img src="https://picsum.photos/300/200">
        </div>
      </div>

    </div>

    <!-- INPUT -->

    <div class="chat-input">

      <!-- EMOJI -->
      <button class="icon-btn">😀</button>

      <!-- IMAGE -->
      <label class="icon-btn">
        📎
        <input type="file" hidden id="imageInput" accept="image/*">
      </label>

      <!-- TEXT -->
      <input
        type="text"
        class="input-box"
        id="messageInput"
        placeholder="Type a message..."
      >

      <!-- SEND -->
      <button class="send-btn" id="sendBtn">
        ➤
      </button>

    </div>

  </div>

  <!-- RIGHT PANEL -->

  <div class="right-panel">

    <h3>Members (3)</h3>

    <div class="member">
      <div class="member-left">
        <div class="member-avatar">U</div>
        <div class="member-name">You</div>
      </div>

      <div class="green-dot"></div>
    </div>

    <div class="member">
      <div class="member-left">
        <div class="member-avatar">A</div>
        <div class="member-name">Alice</div>
      </div>

      <div class="green-dot"></div>
    </div>

    <div class="member">
      <div class="member-left">
        <div class="member-avatar">B</div>
        <div class="member-name">Bob</div>
      </div>

      <div class="green-dot"></div>
    </div>

    <div class="section-title">
      GROUP SETTINGS
    </div>

    <div class="setting">👥 Add People</div>
    <div class="setting">📞 Voice Call</div>
    <div class="setting">🎥 Video Call</div>
    <div class="setting">⚙ Group Info</div>

  </div>

</div>

<script>

const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const chatBody = document.getElementById("chatBody");
const imageInput = document.getElementById("imageInput");

/* SEND MESSAGE */

function sendMessage(){

  const text = messageInput.value.trim();

  if(text === "") return;

  const message = document.createElement("div");

  message.classList.add("message","sent");

  message.innerHTML = `
    <div class="message-content">
      ${text}
    </div>
  `;

  chatBody.appendChild(message);

  messageInput.value = "";

  chatBody.scrollTop = chatBody.scrollHeight;
}

/* SEND BUTTON */

sendBtn.addEventListener("click", sendMessage);

/* ENTER KEY */

messageInput.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    sendMessage();
  }

});

/* IMAGE UPLOAD */

imageInput.addEventListener("change", function(){

  const file = this.files[0];

  if(!file) return;

  const imageURL = URL.createObjectURL(file);

  const message = document.createElement("div");

  message.classList.add("message","sent");

  message.innerHTML = `
    <div class="message-content">
      <img src="${imageURL}">
    </div>
  `;

  chatBody.appendChild(message);

  chatBody.scrollTop = chatBody.scrollHeight;

});

</script>

</body>
</html>
