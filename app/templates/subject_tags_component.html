<!-- Subject Tags Component -->
<!-- Include this in your template where you want to display subject tags -->

<!-- Required: Add these links to your template head -->
<!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/subject_tags.css') }}"> -->

<!-- Required: Hidden room ID for JavaScript initialization -->
<input type="hidden" id="roomId" value="{{ room.id }}">

<!-- Tags Display Section -->
<div class="tags-container" id="roomTagsContainer">
    <!-- Room tags will be rendered here by JavaScript -->
    <p class="tag-empty-state">Loading tags...</p>
</div>

<!-- Tags Management Section (Optional - only show if user is room owner/admin) -->
{% if is_room_owner %}
<div class="tags-management">
    <h3>Manage Tags</h3>
    
    <!-- Tag Input -->
    <div class="tag-input-group">
        <input 
            type="text" 
            id="tagInput" 
            placeholder="Enter a subject tag (e.g., Mathematics, Chemistry, History)"
            maxlength="100"
        />
        <button id="addTagBtn" type="button">Add Tag</button>
    </div>

    <!-- Message Container -->
    <div id="tagMessageContainer"></div>

    <!-- Available Tags Suggestions -->
    <div>
        <p style="font-size: 12px; color: #666; margin-bottom: 8px;">Click to add popular tags:</p>
        <div class="available-tags" id="availableTagsList">
            <!-- Available tags will be rendered here by JavaScript -->
        </div>
    </div>
</div>
{% endif %}
