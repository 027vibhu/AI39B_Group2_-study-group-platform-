<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Logout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auto_logout.css') }}">
  </head>
  <body>
    <main class="auto-logout-page">
      <section class="status">
        <h1>Session Activity</h1>
        <p>Your session is being monitored for inactivity.</p>
      </section>

      <div id="idle-warning" class="idle-warning hidden" role="dialog" aria-modal="true" aria-labelledby="idle-title">
        <div class="idle-content">
          <h2 id="idle-title">You are about to be logged out</h2>
          <p id="idle-message">For your security, you will be logged out due to inactivity in <span id="idle-count">60</span> seconds.</p>
          <div class="idle-actions">
            <button id="stay-signed" class="btn">Stay signed in</button>
            <button id="logout-now" class="btn btn-secondary">Log out now</button>
          </div>
        </div>
      </div>

      <div class="session-indicator">
        <span id="session-time">Active</span>
      </div>
    </main>

    <!-- JS will be added in a later step -->
  </body>
</html>
