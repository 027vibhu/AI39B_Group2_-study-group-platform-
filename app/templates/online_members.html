<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Team Members</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Team Presence Status</h2>
        <p>User Story #4.3: See online/offline members</p>
        
        <div class="member-list">
            <h3>Online Members</h3>
            <ul>
                {% for member in members %}
                    <li class="member-item">
                        <span class="status-indicator online">●</span>
                        <strong>{{ member.username }}</strong> 
                        <span class="timestamp">(Active since: {{ member.last_seen }})</span>
                    </li>
                {% else %}
                    <li class="no-members">No members are currently online.</li>
                {% endfor %}
            </ul>
        </div>
        
        <div class="action-footer">
            <a href="#" class="refresh-btn" onclick="window.location.reload();">Refresh Status</a>
        </div>
    </div>
</body>
</html>
