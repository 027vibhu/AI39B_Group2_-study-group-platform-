<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Room — Lorevia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#4C5372;
    --primary-deep:#3f4561;
    --secondary:#7C7E9D;
    --tertiary:#E2D4E0;
    --accent:#7d86c7;
    --ink:#2f2f2f;
    --muted:#777;
    --soft:#eef1ff;
    --surface:#f3f3f3;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{
    min-height:100vh;display:grid;place-items:center;padding:40px 20px;
    color:var(--ink);
    background:
      radial-gradient(circle at 12% 18%, rgba(125,134,199,0.18), transparent 42%),
      radial-gradient(circle at 88% 82%, rgba(226,212,224,0.30), transparent 45%),
      var(--soft);
  }

  .stage{width:min(520px,100%);position:relative;}

  /* floating ribbon header that breaks out of the card */
  .crest{
    position:relative;z-index:3;width:fit-content;margin:0 auto -34px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;padding:16px 30px;border-radius:22px;
    box-shadow:0 16px 34px rgba(76,83,114,0.34);
    display:flex;align-items:center;gap:12px;
    animation:drop .8s cubic-bezier(.16,1,.3,1) both;
  }
  .crest .dot{width:9px;height:9px;border-radius:50%;background:var(--tertiary);box-shadow:0 0 0 4px rgba(226,212,224,0.25);}
  .crest span{font-size:12px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;}

  .card{
    position:relative;z-index:1;background:#fff;border-radius:30px;
    padding:60px 46px 46px;text-align:center;
    box-shadow:0 26px 60px rgba(76,83,114,0.16);
    border:1px solid rgba(76,83,114,0.06);
    animation:rise .9s cubic-bezier(.16,1,.3,1) both;
  }

  h1{font-size:40px;font-weight:800;letter-spacing:-0.02em;line-height:1.05;}
  h1 em{font-style:normal;color:var(--accent);}
  .sub{color:var(--muted);font-size:14.5px;font-weight:400;margin:14px auto 0;max-width:34ch;line-height:1.6;}

  .code-inputs{display:flex;justify-content:center;gap:11px;margin:38px 0 30px;}
  .code-inputs input{
    width:54px;height:64px;border:2px solid transparent;background:var(--surface);
    border-radius:18px;text-align:center;font-size:26px;font-weight:700;color:var(--primary);
    outline:none;transition:.25s;
  }
  .code-inputs input:hover{background:#ececf3;}
  .code-inputs input:focus{
    background:#fff;border-color:var(--accent);
    box-shadow:0 10px 22px rgba(125,134,199,0.28);transform:translateY(-4px);
  }
  .code-inputs input.filled{background:var(--soft);border-color:rgba(125,134,199,0.4);color:var(--primary-deep);}

  .main-btn{
    width:100%;height:60px;border:none;border-radius:20px;cursor:pointer;color:#fff;
    font-size:15px;font-weight:700;letter-spacing:0.02em;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    box-shadow:0 14px 30px rgba(76,83,114,0.26);transition:.3s;
  }
  .main-btn:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(76,83,114,0.34);}
  .main-btn:active{transform:translateY(0);}

  .footnote{margin-top:22px;font-size:13px;color:var(--muted);}
  .footnote a{color:var(--primary);font-weight:600;text-decoration:none;}
  .footnote a:hover{color:var(--accent);}

  @keyframes drop{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
  @keyframes rise{from{opacity:0;transform:translateY(24px) scale(.98);}to{opacity:1;transform:none;}}

  @media(max-width:520px){
    .card{padding:52px 26px 38px;}
    h1{font-size:32px;}
    .code-inputs{gap:8px;}
    .code-inputs input{width:46px;height:56px;font-size:22px;}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="crest"><span class="dot"></span><span>Lorevia · Study Rooms</span></div>

    <main class="card">
      <h1>Join a <em>room</em></h1>
      <p class="sub">Enter the 6-digit room code to connect with your study team instantly.</p>

      <div class="code-inputs">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
      </div>

      <button class="main-btn" id="joinBtn">Join Room</button>

      <p class="footnote">No code yet? <a href="#">Browse open rooms</a></p>
    </main>
  </div>

  <script>
    const inputs=document.querySelectorAll('.code-inputs input');
    const joinBtn=document.getElementById('joinBtn');
    inputs.forEach((input,i)=>{
      input.addEventListener('input',()=>{
        input.classList.toggle('filled',input.value.length===1);
        if(input.value.length===1&&i<inputs.length-1)inputs[i+1].focus();
      });
      input.addEventListener('keydown',e=>{
        if(e.key==='Backspace'&&input.value===''&&i>0)inputs[i-1].focus();
      });
    });
    joinBtn.addEventListener('click',()=>{
      let code="";inputs.forEach(x=>code+=x.value);
      alert(code.length===6?("Room code entered: "+code):"Please enter a 6-digit room code.");
    });
  </script>
</body>
</html>
